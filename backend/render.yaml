services:
  - type: web
    name: social-media-content-analyzer-api
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGIN
        sync: false
      - key: APP_ENV
        value: production
      - key: MAX_FILE_SIZE
        value: 10485760
